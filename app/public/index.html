<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Fit | Premium Organic Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fdfdfd; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        button:hover { background: #1b5e20 !important; }
    </style>
</head>
<body>

<main style="font-family: 'Inter', sans-serif; background: #fdfdfd;">
    <section class="hero" style="padding: 60px 20px; text-align: center; background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);">
        <h1 style="color: #2e7d32; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px;">Pure. Organic. Natural Fit.</h1>
        <p style="color: #666; max-width: 600px; margin: 0 auto 20px auto; font-size: 1.1rem;">
            Premium organic products secured with DevSecOps excellence.
        </p>
    </section>

    <div class="product-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1000px; margin: auto;">
        
        <div class="card" style="border: 1px solid #eee; border-radius: 15px; overflow: hidden; background: white; text-align: center;">
            <img src="local.png" alt="Organic Serum" style="width:100%; height:200px; object-fit:contain; background:#f9f9f9; padding: 10px;">
            <div style="padding: 20px;">
                <h3 style="margin:0; color:#333;">Organic Serum</h3>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; margin-top:15px; font-weight:600;">Add to Cart</button>
            </div>
        </div>

        <div class="card" style="border: 1px solid #eee; border-radius: 15px; overflow: hidden; background: white; text-align: center;">
            <img src="vercel.png" alt="Herbal Tea Blend" style="width:100%; height:200px; object-fit:contain; background:#f9f9f9; padding: 10px;">
            <div style="padding: 20px;">
                <h3 style="margin:0; color:#333;">Herbal Tea Blend</h3>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; margin-top:15px; font-weight:600;">Add to Cart</button>
            </div>
        </div>

    </div>
</main>

</body>
</html>
