<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Fit</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    color: #22c55e;
}

/* GRID LAYOUT */
.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARD DESIGN */
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* IMAGE BOX (FIXED SIZE) */
.image-box {
    height: 220px;
    background: #0f172a;
}

/* CONTENT */
.content-box {
    padding: 20px;
}

h3 {
    margin-bottom: 10px;
}

/* BUTTONS */
.btn-group {
    display: flex;
    gap: 10px;
}

.buy-btn {
    flex: 2;
    padding: 10px;
    background: #9333ea;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.view-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: white;
}
</style>
</head>

<body>

<section class="hero">
    <h1>Natural Fit</h1>
    <p>Premium Organic Products</p>
</section>

<div class="product-container">

    <div class="card">
        <div class="image-box"></div>
        <div class="content-box">
            <h3>Product 1</h3>
            <div class="btn-group">
                <button class="buy-btn">Add to Cart</button>
                <button class="view-btn">View</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="image-box"></div>
        <div class="content-box">
            <h3>Product 2</h3>
            <div class="btn-group">
                <button class="buy-btn">Add to Cart</button>
                <button class="view-btn">View</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="image-box"></div>
        <div class="content-box">
            <h3>Product 3</h3>
            <div class="btn-group">
                <button class="buy-btn">Add to Cart</button>
                <button class="view-btn">View</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
