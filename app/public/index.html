<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Fit | Premium Organic Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
            background: #fdfdfd; 
            color: #333;
        }
        .hero {
            padding: 60px 20px; 
            text-align: center; 
            background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);
        }
        .product-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 40px; 
            max-width: 1100px; 
            margin: auto; 
        }
        .card { 
            border: 1px solid #eee; 
            border-radius: 20px; 
            overflow: hidden; 
            background: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            text-align: center; 
            display: flex; 
            flex-direction: column;
            transition: 0.3s;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        .image-box {
            height: 250px; /* Fixed height for both cards */
            background: #f9f9f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            border-bottom: 1px solid #eee;
        }
        .product-img {
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Keeps screenshots within the box */
            pointer-events: none; /* Clicking image won't interfere with buttons */
        }
        .content-box {
            padding: 25px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        h3 { 
            margin: 0 0 20px 0; 
            font-size: 1.4rem; 
            color: #2e7d32;
        }
        .buy-btn { 
            width: 100%; 
            background: #2e7d32; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: 0.3s;
        }
        .buy-btn:hover { 
            background: #1b5e20; 
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 style="font-size: 2.8rem; margin-bottom: 10px;">Pure. Organic. Natural Fit.</h1>
        <p style="color: #666; font-size: 1.1rem;">Premium organic products secured with DevSecOps excellence.</p>
    </section>

    <div class="product-container">
        
        <div class="card">
            <div class="image-box">
                <img src="local.png" alt="Organic Serum" class="product-img">
            </div>
            <div class="content-box">
                <h3>Organic Serum</h3>
                <button class="buy-btn" onclick="alert('Added to cart!')">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <div class="image-box">
                <img src="vercel.png" alt="Herbal Tea Blend" class="product-img">
            </div>
            <div class="content-box">
                <h3>Herbal Tea Blend</h3>
                <button class="buy-btn" onclick="alert('Added to cart!')">Add to Cart</button>
            </div>
        </div>

    </div>

    <footer style="text-align: center; padding: 40px; color: #aaa; font-size: 0.8rem;">
        &copy; 2026 Natural Fit. All rights reserved.
    </footer>

</body>
</html>
