<main style="font-family: 'Inter', sans-serif; background: #fdfdfd;">
    <section class="hero" style="padding: 60px 20px; text-align: center; background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);">
        <h1 style="color: #2e7d32; font-size: 2.5rem; font-weight: 700;">Pure. Organic. Natural Fit.</h1>
        <p style="color: #666; max-width: 600px; margin: 10px auto;">Premium organic products for a sustainable lifestyle, secured with automated DevSecOps excellence.</p>
    </section>

    <div class="product-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; max-width: 1200px; margin: auto;">
        
        <div class="card" style="border: 1px solid #eee; border-radius: 15px; overflow: hidden; transition: 0.3s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <img src="local.png" alt="Organic Serum" style="width:100%; height:250px; object-fit:contain; background:#f9f9f9;">
            <div style="padding: 20px;">
                <h3 style="margin:0; color:#333;">Organic Serum</h3>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:600; margin-top:15px;">Add to Cart</button>
            </div>
        </div>

        <div class="card" style="border: 1px solid #eee; border-radius: 15px; overflow: hidden; transition: 0.3s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <img src="vercel.png" alt="Herbal Tea Blend" style="width:100%; height:250px; object-fit:contain; background:#f9f9f9;">
            <div style="padding: 20px;">
                <h3 style="margin:0; color:#333;">Herbal Tea Blend</h3>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:600; margin-top:15px;">Add to Cart</button>
            </div>
        </div>

    </div>
</main>
