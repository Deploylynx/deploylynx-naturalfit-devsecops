<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Fit | Premium Organic Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #fdfdfd; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        button:hover { background: #1b5e20 !important; }
    </style>
</head>
<body>

<main style="font-family: 'Inter', sans-serif; background: #fdfdfd;">
    <section class="hero" style="padding: 80px 20px; text-align: center; background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);">
        <h1 style="color: #2e7d32; font-size: 3rem; font-weight: 700; margin-bottom: 15px;">Pure. Organic. Natural Fit.</h1>
        <p style="color: #666; max-width: 600px; margin: 0 auto 30px auto; font-size: 1.1rem; line-height: 1.6;">
            Premium organic products for a sustainable lifestyle, secured with automated DevSecOps excellence.
        </p>
    </section>

    <div class="product-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 60px 20px; max-width: 1200px; margin: auto;">
        
        <div class="card" style="border: 1px solid #eee; border-radius: 20px; overflow: hidden; transition: 0.4s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <img src="/images/product1.png" alt="Organic Serum" style="width:100%; height:280px; object-fit:cover;">
            <div style="padding: 25px;">
                <h3 style="margin:0; color:#333; font-size: 1.4rem;">Organic Serum</h3>
                <p style="color:#2e7d32; font-weight:bold; margin: 15px 0; font-size: 1.2rem;">$29.00</p>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:14px; border-radius:10px; cursor:pointer; font-weight:600; transition: 0.3s;">Add to Cart</button>
            </div>
        </div>

        <div class="card" style="border: 1px solid #eee; border-radius: 20px; overflow: hidden; transition: 0.4s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <img src="/images/product2.png" alt="Herbal Tea Blend" style="width:100%; height:280px; object-fit:cover;">
            <div style="padding: 25px;">
                <h3 style="margin:0; color:#333; font-size: 1.4rem;">Herbal Tea Blend</h3>
                <p style="color:#2e7d32; font-weight:bold; margin: 15px 0; font-size: 1.2rem;">$15.00</p>
                <button style="width:100%; background:#2e7d32; color:white; border:none; padding:14px; border-radius:10px; cursor:pointer; font-weight:600; transition: 0.3s;">Add to Cart</button>
            </div>
        </div>

    </div>
</main>

<footer style="text-align: center; padding: 40px; color: #999; font-size: 0.9rem; border-top: 1px solid #eee;">
    &copy; 2026 Natural Fit. All rights reserved.
</footer>

</body>
</html>
