# 2. SAST (Static Application Security Testing)
      - name: Snyk Code Scan
        uses: snyk/actions/node@master
        with:
          args: app --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 3. Dependency Scanning (SCA)
      - name: Snyk Open Source Scan
        uses: snyk/actions/node@master
        with:
          command: monitor
          args: app
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}