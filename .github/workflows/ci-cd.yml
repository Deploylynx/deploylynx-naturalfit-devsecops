name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: |
          cd app
          npm install

      - name: Run NPM Security Audit
        run: |
          cd app
          npm audit --audit-level=high 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t app-image:latest -f app/Dockerfile app

      - name: List Docker images (debug)
        run: docker images

      - name: Trivy Scan (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      - name: Tag Image
        run: docker tag app-image:latest ${{ secrets.DOCKERHUB_USER }}/app-image:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USER }}/app-image:latest