docker-security:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t naturalfit-app ./app

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: naturalfit-app
        format: table
        exit-code: 0