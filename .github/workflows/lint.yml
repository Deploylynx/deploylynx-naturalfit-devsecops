name: DevSecOps CI Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint .

docker-security:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t naturalfit-app:latest ./app

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: naturalfit-app:latest
        format: table
        exit-code: "0"